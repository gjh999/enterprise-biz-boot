<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head>
    <title th:text="#{svc.issuance.heading}">민원발급</title>
</head>
<body>
<main layout:fragment="content">
    <div class="container">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a th:href="@{/}" th:text="#{about.crumb.home}">홈</a></li>
                <li class="breadcrumb-item"><a th:href="@{/EgovPageLink.do(linkIndex=0)}" th:text="#{svc.crumb.minwon}">민원광장</a></li>
                <li class="breadcrumb-item active" th:text="#{svc.issuance.crumb}">민원발급</li>
            </ol>
        </nav>

        <h1 class="h4 mb-2"><i class="bi bi-clipboard-check"></i> <span th:text="#{svc.heading}">민원광장</span></h1>
        <p class="text-muted" th:text="#{svc.desc}">프레임워크 관련 서비스의 운영개선을 위한 창조적인 의견이나 아이디어 제안을 기다립니다.</p>

        <h2 class="h5 mb-3"><span th:text="#{svc.issuance.heading}">민원발급</span> <span class="krds-badge bg-gray" th:text="#{svc.badge.sample}">샘플화면</span></h2>

        <!-- 검색조건 -->
        <form class="row g-2 mb-3" onsubmit="return false;">
            <div class="col-auto">
                <select class="krds-form-select" id="sel1" th:title="#{bbs.search.cnd}" title="조건">
                    <option value="0" th:text="#{svc.search.minwon}">민원검색</option>
                </select>
            </div>
            <div class="col-auto">
                <input class="krds-input" type="text" style="width:320px;" th:title="#{bbs.search.wrd}" title="검색어"/>
            </div>
            <div class="col-auto">
                <button class="krds-btn primary" type="submit" th:text="#{button.inquiry}">조회</button>
            </div>
        </form>
        <!--// 검색조건 -->

        <div class="krds-panel mb-4">
            <div class="krds-panel-body">
                <div class="row g-3 align-items-center">
                    <div class="col-md-2 fw-semibold" th:text="#{svc.label.byOrgan}">소속기관별</div>
                    <div class="col-md-4">
                        <select class="krds-form-select" id="sel2" th:title="#{bbs.search.cnd}" title="조건"><option value="0" th:text="#{svc.search.integrated}">통합검색</option></select>
                    </div>
                    <div class="col-md-2 fw-semibold" th:text="#{svc.label.byProcOrgan}">처리기관별</div>
                    <div class="col-md-4">
                        <select class="krds-form-select" id="sel3" th:title="#{bbs.search.cnd}" title="조건"><option value="0" th:text="#{svc.search.integrated}">통합검색</option></select>
                    </div>
                    <div class="col-md-2 fw-semibold" th:text="#{svc.label.certNeed}">인증서 필요여부</div>
                    <div class="col-md-4">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="chk1"/>
                            <label class="form-check-label" for="chk1" th:text="#{svc.label.need}">필요</label>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-2">
            <h3 class="h6 mb-0" th:text="#{svc.subheading.internetApply}">인터넷 민원신청</h3>
            <span class="text-muted"><span th:text="#{common.total}">총</span> <strong>1,274</strong> <span th:text="#{common.unit.case}">건</span></span>
        </div>

        <!-- 게시판 -->
        <div class="krds-table-wrap">
            <table class="tbl">
                <caption th:text="#{svc.caption.internetApply}">인터넷 민원신청 목록</caption>
                <thead>
                <tr>
                    <th scope="col" style="width:90px;" th:text="#{svc.col.no}">번호</th>
                    <th scope="col" th:text="#{svc.col.minwonName}">민원사무명</th>
                    <th scope="col" style="width:115px;" th:text="#{svc.col.internetApply}">인터넷신청</th>
                    <th scope="col" style="width:115px;" th:text="#{svc.col.procOrgan}">처리기관</th>
                    <th scope="col" style="width:115px;" th:text="#{svc.col.belongOrgan}">소속기관</th>
                    <th scope="col" style="width:115px;" th:text="#{svc.col.receiveMethod}">수령방법</th>
                    <th scope="col" style="width:115px;" th:text="#{svc.col.cert}">인증서</th>
                </tr>
                </thead>
                <tbody>
                <tr>
                    <td>3</td>
                    <td><a href="#" onclick="return false;" th:text="#{svc.row.certIssue}">표준프레임워크 인증서 발급</a></td>
                    <td th:text="#{svc.row.apply}">신청</td><td th:text="#{svc.row.mois}">행정안전부</td><td th:text="#{svc.row.sds}">삼성SDS</td><td th:text="#{svc.row.eIssue}">전자발급</td><td th:text="#{svc.row.notNeeded}">불필요</td>
                </tr>
                <tr>
                    <td>2</td>
                    <td><a href="#" onclick="return false;" th:text="#{svc.row.certIssue}">표준프레임워크 인증서 발급</a></td>
                    <td th:text="#{svc.row.apply}">신청</td><td th:text="#{svc.row.mois}">행정안전부</td><td th:text="#{svc.row.sds}">삼성SDS</td><td th:text="#{svc.row.eIssue}">전자발급</td><td th:text="#{svc.row.notNeeded}">불필요</td>
                </tr>
                <tr>
                    <td>1</td>
                    <td><a href="#" onclick="return false;" th:text="#{svc.row.certIssue}">표준프레임워크 인증서 발급</a></td>
                    <td th:text="#{svc.row.apply}">신청</td><td th:text="#{svc.row.mois}">행정안전부</td><td th:text="#{svc.row.sds}">삼성SDS</td><td th:text="#{svc.row.eIssue}">전자발급</td><td th:text="#{svc.row.notNeeded}">불필요</td>
                </tr>
                </tbody>
            </table>
        </div>
        <!--// 게시판 -->
    </div>
</main>
</body>
</html>
