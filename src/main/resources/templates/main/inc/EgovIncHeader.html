<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="ko">
<head>
    <meta charset="UTF-8"/>
    <title th:text="#{inc.title.header}">업무 헤더</title>
</head>
<body>
<header class="egov-biz-header border-bottom p-2">
    <div class="d-flex justify-content-between align-items-center">
        <strong th:text="#{inc.header.brand}">전자정부 표준프레임워크 기업업무 공통컴포넌트</strong>
        <span sec:authorize="isAuthenticated()">
            <span sec:authentication="name">사용자</span> <span th:text="#{inc.header.honorific}">님</span>
        </span>
    </div>
    <ul class="nav" th:if="${list_headmenu != null}">
        <li class="nav-item" th:each="m : ${list_headmenu}">
            <a class="nav-link" th:text="${m.menuNm}">메뉴</a>
        </li>
    </ul>
</header>
</body>
</html>
