<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head>
    <title th:text="#{mber.manage.title}">회원관리</title>
</head>
<body>
<main layout:fragment="content">
    <div class="container">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a th:href="@{/}" th:text="#{common.home}">홈</a></li>
                <li class="breadcrumb-item active" th:text="#{mber.manage.title}">회원관리</li>
            </ol>
        </nav>
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h1 class="h4 mb-0"><i class="bi bi-people"></i> <span th:text="#{mber.manage.title}">회원관리</span></h1>
            <span class="text-muted small"><span th:text="#{common.total}">총</span> <strong
                    th:text="${paginationInfo != null ? paginationInfo.totalRecordCount : 0}">0</strong> <span th:text="#{common.unit.case}">건</span></span>
        </div>

        <div class="alert alert-success py-2" th:if="${resultMsg == 'success.common.insert'}" th:text="#{mber.msg.insert}">등록되었습니다.</div>
        <div class="alert alert-success py-2" th:if="${resultMsg == 'success.common.update'}" th:text="#{mber.msg.update}">수정되었습니다.</div>
        <div class="alert alert-success py-2" th:if="${resultMsg == 'success.common.delete'}" th:text="#{mber.msg.delete}">삭제되었습니다.</div>

        <!-- 검색조건 (회원구분 userTy / 상태 sbscrbSttus / 조건 searchCondition 0=아이디·1=이름 / 키워드) -->
        <form class="row g-2 mb-3" th:action="@{/uss/umt/mber/EgovMberManage.do}" method="get"
              th:with="sttusList=${entrprsMberSttus_result}, ut=${userSearchVO.userTy}">
            <div class="col-auto">
                <select class="krds-form-select" name="userTy" th:title="#{mber.manage.userTy.select}" title="회원구분 선택">
                    <option value="0" th:selected="${ut == '0' or ut == null}" th:text="#{mber.manage.userTy.all}">전체</option>
                    <option value="USR01" th:selected="${ut == 'USR01'}" th:text="#{mber.ty.gnr}">일반회원</option>
                    <option value="USR02" th:selected="${ut == 'USR02'}" th:text="#{mber.ty.ent}">기업회원</option>
                    <option value="USR03" th:selected="${ut == 'USR03'}" th:text="#{mber.ty.usr}">업무사용자</option>
                </select>
            </div>
            <div class="col-auto">
                <select class="krds-form-select" name="sbscrbSttus" th:title="#{mber.manage.searchSttus}"
                        th:with="ss=${userSearchVO.sbscrbSttus}">
                    <option value="0" th:selected="${ss == '0'}" th:text="#{mber.manage.sttus.all}">상태 전체</option>
                    <th:block th:if="${not #lists.isEmpty(sttusList)}">
                        <option th:each="c : ${sttusList}" th:value="${c.code}" th:text="${c.codeNm}"
                                th:selected="${ss == c.code}">상태</option>
                    </th:block>
                    <th:block th:if="${#lists.isEmpty(sttusList)}">
                        <option value="A" th:selected="${ss == 'A'}" th:text="#{mber.sttus.apply}">가입신청</option>
                        <option value="P" th:selected="${ss == 'P'}" th:text="#{mber.sttus.approve}">가입승인</option>
                        <option value="D" th:selected="${ss == 'D'}" th:text="#{mber.sttus.delete}">가입삭제</option>
                    </th:block>
                </select>
            </div>
            <div class="col-auto">
                <select class="krds-form-select" name="searchCondition" th:title="#{mber.search.cond}"
                        th:with="sc=${userSearchVO.searchCondition}">
                    <option value="" th:selected="${sc == ''}" th:text="#{mber.opt.select}">선택</option>
                    <option value="0" th:selected="${sc == '0'}" th:text="#{mber.search.cond.id}">아이디</option>
                    <option value="1" th:selected="${sc == '1'}" th:text="#{mber.search.cond.name}">이름</option>
                </select>
            </div>
            <div class="col-auto">
                <input class="krds-input" type="text" name="searchKeyword"
                       th:value="${userSearchVO.searchKeyword}" maxlength="35" th:title="#{common.search.ph}" title="검색어 입력"/>
            </div>
            <div class="col-auto">
                <button class="krds-btn tertiary small" type="submit"><i class="bi bi-search"></i> <span th:text="#{button.inquiry}">조회</span></button>
            </div>
        </form>

        <form id="listForm" th:action="@{/uss/umt/mber/EgovMberDelete.do}" method="post">
            <input type="hidden" name="checkedIdForDel" id="checkedIdForDel"/>
            <input type="hidden" name="checkedIdForApprove" id="checkedIdForApprove"/>
            <div class="krds-table-wrap">
            <table class="tbl">
                <caption class="visually-hidden" th:text="#{mber.manage.title}">회원 목록</caption>
                <thead>
                <tr>
                    <th scope="col" style="width:40px;"><input type="checkbox" id="checkAll" th:title="#{sec.author.checkAll}" title="전체선택"/></th>
                    <th scope="col" style="width:110px;" th:text="#{mber.col.userTy}">회원구분</th>
                    <th scope="col" th:text="#{mber.col.id}">아이디</th>
                    <th scope="col" th:text="#{mber.col.name}">이름</th>
                    <th scope="col" th:text="#{mber.col.email}">이메일</th>
                    <th scope="col" style="width:100px;" th:text="#{mber.col.sttus}">상태</th>
                    <th scope="col" style="width:130px;" th:text="#{mber.col.sbscrbde}">가입일</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="item : ${resultList}">
                    <td>
                        <input type="checkbox" class="rowChk"
                               th:attr="data-id=${item.userty} + ':' + ${item.uniqid}, data-sttus=${item.sttus}"
                               th:title="#{sec.author.rowSelect}" title="선택"/>
                    </td>
                    <td class="text-center">
                        <span th:text="${item.userty == 'USR01'} ? #{mber.ty.gnr} : (${item.userty == 'USR02'} ? #{mber.ty.ent} : (${item.userty == 'USR03'} ? #{mber.ty.usr} : ${item.userty}))">회원구분</span>
                    </td>
                    <td>
                        <!-- 회원구분(userTy)별 알맞은 수정 화면으로 라우팅 (USR03 업무사용자 수정화면 미구현 → 텍스트) -->
                        <a th:if="${item.userty == 'USR01'}" class="text-decoration-none"
                           th:href="@{/uss/umt/mber/EgovMberSelectUpdtView.do(selectedId=${item.uniqid},pageIndex=${userSearchVO.pageIndex})}"
                           th:text="${item.userid}">아이디</a>
                        <a th:if="${item.userty == 'USR02'}" class="text-decoration-none"
                           th:href="@{/uss/umt/mber/EgovEntrprsMberSelectUpdtView.do(selectedId=${item.uniqid},pageIndex=${userSearchVO.pageIndex})}"
                           th:text="${item.userid}">아이디</a>
                        <span th:unless="${item.userty == 'USR01' or item.userty == 'USR02'}" th:text="${item.userid}">아이디</span>
                    </td>
                    <td th:text="${item.usernm}">이름</td>
                    <td th:text="${item.emailadres}">이메일</td>
                    <td class="text-center">
                        <span class="krds-badge"
                              th:classappend="${item.sttus == 'P'} ? 'bg-success' : (${item.sttus == 'D'} ? 'bg-danger' : 'bg-gray')"
                              th:text="${item.sttus == 'A'} ? #{mber.badge.apply} : (${item.sttus == 'P'} ? #{mber.badge.approve} : (${item.sttus == 'D'} ? #{mber.badge.delete} : ${item.sttus}))">상태</span>
                    </td>
                    <td class="text-center" th:text="${item.sbscrbde}">가입일</td>
                </tr>
                <tr th:if="${#lists.isEmpty(resultList)}">
                    <td colspan="7" class="text-center text-muted py-4" th:text="#{mber.empty}">등록된 회원이 없습니다.</td>
                </tr>
                </tbody>
            </table>
            </div>

            <div class="d-flex justify-content-between">
                <div class="d-flex gap-2">
                    <button type="button" class="krds-btn primary small" onclick="approveChecked()">
                        <i class="bi bi-check2-circle"></i> <span th:text="#{mber.btn.approveSelected}">선택 승인</span>
                    </button>
                    <button type="button" class="krds-btn danger small" onclick="deleteChecked()">
                        <i class="bi bi-trash"></i> <span th:text="#{mber.btn.deleteSelected}">선택 삭제</span>
                    </button>
                </div>
                <a class="krds-btn primary small" th:href="@{/uss/umt/mber/EgovMberInsertView.do}">
                    <i class="bi bi-person-plus"></i> <span th:text="#{mber.btn.register}">회원 등록</span>
                </a>
            </div>
        </form>

        <!-- 페이징 (검색조건 유지: userTy/sbscrbSttus/searchCondition/searchKeyword) -->
        <nav th:aria-label="#{common.pageNav}" aria-label="페이지 네비게이션" class="mt-3"
             th:if="${paginationInfo != null and paginationInfo.totalRecordCount > 0}">
            <div class="krds-pagination">
                <a class="page-navi prev" th:aria-label="#{common.prev}" th:classappend="${paginationInfo.firstPageNoOnPageList == 1} ? 'disabled' : ''" th:text="#{common.prev}"
                   th:href="${paginationInfo.firstPageNoOnPageList > 1}
                            ? @{/uss/umt/mber/EgovMberManage.do(pageIndex=${paginationInfo.firstPageNoOnPageList - 1},userTy=${userSearchVO.userTy},sbscrbSttus=${userSearchVO.sbscrbSttus},searchCondition=${userSearchVO.searchCondition},searchKeyword=${userSearchVO.searchKeyword})}
                            : '#'">이전</a>
                <div class="page-links">
                    <a class="page-link" th:each="pageNo : ${#numbers.sequence(paginationInfo.firstPageNoOnPageList, paginationInfo.lastPageNoOnPageList)}"
                       th:classappend="${pageNo == paginationInfo.currentPageNo} ? 'active' : ''"
                       th:href="@{/uss/umt/mber/EgovMberManage.do(pageIndex=${pageNo},userTy=${userSearchVO.userTy},sbscrbSttus=${userSearchVO.sbscrbSttus},searchCondition=${userSearchVO.searchCondition},searchKeyword=${userSearchVO.searchKeyword})}"><span th:text="${pageNo}">1</span></a>
                </div>
                <a class="page-navi next" th:aria-label="#{common.next}" th:classappend="${paginationInfo.lastPageNoOnPageList == paginationInfo.totalPageCount} ? 'disabled' : ''" th:text="#{common.next}"
                   th:href="${paginationInfo.lastPageNoOnPageList < paginationInfo.totalPageCount}
                            ? @{/uss/umt/mber/EgovMberManage.do(pageIndex=${paginationInfo.lastPageNoOnPageList + 1},userTy=${userSearchVO.userTy},sbscrbSttus=${userSearchVO.sbscrbSttus},searchCondition=${userSearchVO.searchCondition},searchKeyword=${userSearchVO.searchKeyword})}
                            : '#'">다음</a>
            </div>
        </nav>
    </div>
    <script th:inline="javascript">
        var APPROVE_URL = /*[[@{/uss/umt/mber/EgovMberApprove.do}]]*/ '/uss/umt/mber/EgovMberApprove.do';
        var DELETE_URL = /*[[@{/uss/umt/mber/EgovMberDelete.do}]]*/ '/uss/umt/mber/EgovMberDelete.do';
        document.getElementById('checkAll').addEventListener('change', function () {
            document.querySelectorAll('.rowChk').forEach(c => c.checked = this.checked);
        });
        function deleteChecked() {
            var ids = [];
            document.querySelectorAll('.rowChk:checked').forEach(function (c) {
                ids.push(c.getAttribute('data-id'));
            });
            if (ids.length === 0) { alert(/*[[#{mber.js.selectDelete}]]*/ '삭제할 회원을 선택하세요.'); return; }
            if (!confirm((/*[[#{mber.js.confirmDelete1}]]*/ '선택한 ') + ' ' + ids.length + (/*[[#{mber.js.confirmDelete2}]]*/ '명의 회원을 삭제하시겠습니까?'))) return;
            var form = document.getElementById('listForm');
            document.getElementById('checkedIdForDel').value = ids.join(',');
            form.action = DELETE_URL;
            form.submit();
        }
        function approveChecked() {
            var ids = [];
            document.querySelectorAll('.rowChk:checked').forEach(function (c) {
                if (c.getAttribute('data-sttus') === 'A') {
                    ids.push(c.getAttribute('data-id'));
                }
            });
            if (ids.length === 0) { alert(/*[[#{mber.js.selectApprove}]]*/ '승인대기(신청중) 상태의 회원을 선택하세요.'); return; }
            if (!confirm((/*[[#{mber.js.confirmApprove1}]]*/ '선택한 ') + ' ' + ids.length + (/*[[#{mber.js.confirmApprove2}]]*/ '명의 회원을 승인하시겠습니까?'))) return;
            var form = document.getElementById('listForm');
            document.getElementById('checkedIdForApprove').value = ids.join(',');
            form.action = APPROVE_URL;
            form.submit();
        }
    </script>
</main>
</body>
</html>
