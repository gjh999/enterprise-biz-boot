<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title th:text="#{usr.pwd.title}">업무사용자 비밀번호 변경</title></head>
<body>
<main layout:fragment="content">
    <div class="container" style="max-width:560px;">
        <nav aria-label="breadcrumb"><ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}" th:text="#{common.home}">홈</a></li>
            <li class="breadcrumb-item"><a th:href="@{/uss/umt/user/EgovUserManage.do}" th:text="#{usr.manage.title}">업무사용자관리</a></li>
            <li class="breadcrumb-item active" th:text="#{mber.pwd.title}">비밀번호 변경</li>
        </ol></nav>
        <h1 class="h4 mb-3"><i class="bi bi-key"></i> <span th:text="#{mber.pwd.title}">비밀번호 변경</span></h1>

        <div class="alert alert-success py-2" th:if="${resultMsg == 'success.common.update'}" th:text="#{usr.pwd.success}">비밀번호가 변경되었습니다.</div>
        <div class="alert alert-danger py-2" th:if="${resultMsg == 'fail.user.passwordUpdate1'}" th:text="#{usr.pwd.fail1}">기존 비밀번호가 일치하지 않습니다.</div>
        <div class="alert alert-danger py-2" th:if="${resultMsg == 'fail.user.passwordUpdate2'}" th:text="#{usr.pwd.fail2}">새 비밀번호와 비밀번호 확인이 일치하지 않습니다.</div>
        <div class="alert alert-danger py-2" th:if="${resultMsg == 'fail.user.passwordUpdate3'}" th:text="#{usr.pwd.fail3}">새 비밀번호를 입력하세요.</div>
        <div class="alert alert-danger py-2" th:if="${resultMsg == 'fail.user.passwordUpdate4'}" th:text="#{usr.pwd.fail4}">새 비밀번호는 20자 이내로 입력하세요.</div>
        <div class="alert alert-danger py-2" th:if="${resultMsg == 'fail.common.msg'}" th:text="#{usr.pwd.fail5}">처리 중 오류가 발생했습니다.</div>

        <form name="passwordChgVO" id="passwordChgVO" method="post"
              th:action="@{/uss/umt/user/EgovUserPasswordUpdt.do}" th:object="${userManageVO}">
            <input type="hidden" name="uniqId" th:value="*{uniqId}"/>
            <input type="hidden" name="userTy" th:value="*{userTy}"/>
            <input type="hidden" name="emplyrId" th:value="*{emplyrId}"/>
            <!-- 검색조건 유지 -->
            <input type="hidden" name="searchCondition" th:value="${userSearchVO != null ? userSearchVO.searchCondition : ''}"/>
            <input type="hidden" name="searchKeyword" th:value="${userSearchVO != null ? userSearchVO.searchKeyword : ''}"/>
            <input type="hidden" name="sbscrbSttus" th:value="${userSearchVO != null ? userSearchVO.sbscrbSttus : '0'}"/>
            <input type="hidden" name="pageIndex" th:value="${userSearchVO != null ? userSearchVO.pageIndex : 1}"/>

            <div class="mb-3">
                <label class="form-label" th:text="#{usr.label.id}">사용자아이디</label>
                <input class="krds-input" type="text" th:value="*{emplyrId}" readonly/>
            </div>
            <div class="mb-3">
                <label class="form-label" th:text="#{usr.pwd.old}">기존 비밀번호</label>
                <input class="krds-input" type="password" name="oldPassword" id="oldPassword" maxlength="20"/>
            </div>
            <div class="mb-3">
                <label class="form-label" th:text="#{mber.pwd.new}">새 비밀번호</label>
                <input class="krds-input" type="password" name="newPassword" id="newPassword" maxlength="20"/>
            </div>
            <div class="mb-3">
                <label class="form-label" th:text="#{mber.pwd.new2}">새 비밀번호 확인</label>
                <input class="krds-input" type="password" name="newPassword2" id="newPassword2" maxlength="20"/>
            </div>

            <div class="d-flex justify-content-between mt-4">
                <a class="krds-btn tertiary" th:href="@{/uss/umt/user/EgovUserManage.do}" th:text="#{button.list}">목록</a>
                <button class="krds-btn primary" type="submit"><i class="bi bi-check-lg"></i> <span th:text="#{button.save}">저장</span></button>
            </div>
        </form>
    </div>
    <script th:inline="javascript">
        document.getElementById('passwordChgVO').addEventListener('submit', function (e) {
            var np = document.getElementById('newPassword').value;
            var np2 = document.getElementById('newPassword2').value;
            if (np !== np2) { e.preventDefault(); alert([[#{usr.pwd.fail2}]]); }
        });
    </script>
</main>
</body>
</html>
