<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title>상세코드 관리</title></head>
<body>
<main layout:fragment="content">
    <div class="container">
        <nav aria-label="breadcrumb"><ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}">홈</a></li>
            <li class="breadcrumb-item">내부시스템관리</li>
            <li class="breadcrumb-item active">상세코드관리</li>
        </ol></nav>
        <h1 class="h4 mb-3"><i class="bi bi-list-ul"></i> 상세코드관리</h1>

        <form class="row g-2 mb-3" th:action="@{/sym/ccm/cde/EgovCcmCmmnDetailCodeList.do}" method="get">
            <div class="col-auto">
                <select class="form-select" name="searchCondition">
                    <option value="" th:selected="${searchVO.searchCondition == ''}">선택하세요</option>
                    <option value="1" th:selected="${searchVO.searchCondition == '1'}">코드ID</option>
                    <option value="2" th:selected="${searchVO.searchCondition == '2'}">코드</option>
                    <option value="3" th:selected="${searchVO.searchCondition == '3'}">코드명</option>
                </select>
            </div>
            <div class="col-auto"><input class="form-control" name="searchKeyword" th:value="${searchVO.searchKeyword}" maxlength="35" placeholder="검색어"/></div>
            <div class="col-auto"><button class="btn btn-primary" type="submit"><i class="bi bi-search"></i> 조회</button></div>
            <div class="col-auto ms-auto" sec:authorize="hasRole('ROLE_ADMIN')">
                <a class="btn btn-success" th:href="@{/sym/ccm/cde/EgovCcmCmmnDetailCodeRegist.do}"><i class="bi bi-plus-lg"></i> 등록</a>
            </div>
        </form>

        <table class="table table-hover align-middle">
            <thead class="table-light">
            <tr><th style="width:80px;">순번</th><th>코드ID</th><th>코드</th><th>코드명</th><th style="width:100px;">사용여부</th></tr>
            </thead>
            <tbody>
            <tr th:each="item,stat : ${resultList}">
                <td th:text="${paginationInfo.totalRecordCount - ((searchVO.pageIndex-1) * searchVO.pageSize) - stat.index}">1</td>
                <td><a th:href="@{/sym/ccm/cde/EgovCcmCmmnDetailCodeDetail.do(codeId=${item.codeId}, code=${item.code})}" th:text="${item.codeId}">코드ID</a></td>
                <td th:text="${item.code}">코드</td>
                <td th:text="${item.codeNm}">코드명</td>
                <td th:text="${item.useAt == 'Y'} ? '사용' : '미사용'">사용</td>
            </tr>
            <tr th:if="${resultList == null or #lists.isEmpty(resultList)}">
                <td colspan="5" class="text-center text-muted py-4">데이터가 없습니다.</td>
            </tr>
            </tbody>
        </table>

        <div class="mt-3"
             th:replace="~{fragments/pagination :: paginationSearch(paginationInfo=${paginationInfo}, baseUrl='/sym/ccm/cde/EgovCcmCmmnDetailCodeList.do', searchCondition=${searchVO.searchCondition}, searchKeyword=${searchVO.searchKeyword})}"></div>
    </div>
</main>
</body>
</html>
