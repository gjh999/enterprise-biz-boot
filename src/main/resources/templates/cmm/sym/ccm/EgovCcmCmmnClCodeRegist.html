<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title th:text="#{ccm.cl.regist.title}">분류코드 등록</title></head>
<body>
<main layout:fragment="content">
    <div class="container">
        <nav aria-label="breadcrumb"><ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}" th:text="#{nav.home}">홈</a></li>
            <li class="breadcrumb-item"><a th:href="@{/sym/ccm/ccc/EgovCcmCmmnClCodeList.do}" th:text="#{nav.clCode}">분류코드관리</a></li>
            <li class="breadcrumb-item active" th:text="#{ccm.regist.nav}">등록</li>
        </ol></nav>
        <h1 class="h4 mb-3"><i class="bi bi-folder"></i> <span th:text="#{ccm.cl.regist.title}">분류코드 등록</span></h1>

        <form th:action="@{/sym/ccm/ccc/EgovCcmCmmnClCodeRegist.do}" method="post" th:object="${cmmnClCode}">
            <table class="tbl col">
                <caption class="visually-hidden" th:text="#{ccm.cl.regist.caption}">분류코드 등록</caption>
                <colgroup><col style="width:190px;"><col></colgroup>
                <tbody>
                <tr>
                    <th scope="row"><span th:text="#{ccm.cl.clCode}">분류코드</span> <span class="frm-rq">*</span></th>
                    <td>
                        <input class="krds-input" type="text" th:field="*{clCode}" maxlength="3"/>
                        <span class="text-danger" th:if="${#fields.hasErrors('clCode')}" th:errors="*{clCode}"></span>
                    </td>
                </tr>
                <tr>
                    <th scope="row"><span th:text="#{ccm.cl.clCodeNm}">분류코드명</span> <span class="frm-rq">*</span></th>
                    <td>
                        <input class="krds-input" type="text" th:field="*{clCodeNm}" maxlength="60"/>
                        <span class="text-danger" th:if="${#fields.hasErrors('clCodeNm')}" th:errors="*{clCodeNm}"></span>
                    </td>
                </tr>
                <tr>
                    <th scope="row"><span th:text="#{ccm.cl.clCodeDc}">분류코드설명</span> <span class="frm-rq">*</span></th>
                    <td>
                        <textarea class="krds-input" rows="4" th:field="*{clCodeDc}"></textarea>
                        <span class="text-danger" th:if="${#fields.hasErrors('clCodeDc')}" th:errors="*{clCodeDc}"></span>
                    </td>
                </tr>
                <tr>
                    <th scope="row"><span th:text="#{ccm.useAt}">사용여부</span> <span class="frm-rq">*</span></th>
                    <td>
                        <select class="krds-form-select" th:field="*{useAt}">
                            <option value="Y">Yes</option>
                            <option value="N">No</option>
                        </select>
                        <span class="text-danger" th:if="${#fields.hasErrors('useAt')}" th:errors="*{useAt}"></span>
                    </td>
                </tr>
                </tbody>
            </table>
            <div class="d-flex gap-2">
                <button class="krds-btn primary" type="submit"><i class="bi bi-check-lg"></i> <span th:text="#{button.save}">저장</span></button>
                <a class="krds-btn tertiary" th:href="@{/sym/ccm/ccc/EgovCcmCmmnClCodeList.do}" th:text="#{button.list}">목록</a>
            </div>
        </form>
    </div>
</main>
</body>
</html>
