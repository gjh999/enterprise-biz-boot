<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title>상세코드 상세</title></head>
<body>
<main layout:fragment="content">
    <div class="container">
        <nav aria-label="breadcrumb"><ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}">홈</a></li>
            <li class="breadcrumb-item"><a th:href="@{/sym/ccm/cde/EgovCcmCmmnDetailCodeList.do}">상세코드관리</a></li>
            <li class="breadcrumb-item active">상세</li>
        </ol></nav>
        <h1 class="h4 mb-3"><i class="bi bi-list-ul"></i> 상세코드 상세</h1>

        <div th:if="${result == null}" class="alert alert-warning">상세 데이터가 없습니다.</div>

        <table class="tbl col" th:if="${result != null}">
            <caption class="visually-hidden">상세코드 상세</caption>
            <colgroup><col style="width:190px;"><col></colgroup>
            <tbody>
            <tr><th scope="row">코드ID</th><td th:text="${result.codeIdNm}">코드ID</td></tr>
            <tr><th scope="row">코드</th><td th:text="${result.code}">코드</td></tr>
            <tr><th scope="row">코드명</th><td th:text="${result.codeNm}">코드명</td></tr>
            <tr><th scope="row">코드설명</th><td th:text="${result.codeDc}">설명</td></tr>
            <tr><th scope="row">사용여부</th><td th:text="${result.useAt == 'Y'} ? 'Yes' : 'No'">Yes</td></tr>
            </tbody>
        </table>

        <div class="d-flex gap-2" th:if="${result != null}">
            <a class="krds-btn tertiary" th:href="@{/sym/ccm/cde/EgovCcmCmmnDetailCodeList.do}"><i class="bi bi-list"></i> 목록</a>
            <a sec:authorize="hasRole('ROLE_ADMIN')" class="krds-btn primary"
               th:href="@{/sym/ccm/cde/EgovCcmCmmnDetailCodeModify.do(codeId=${result.codeId}, code=${result.code})}"><i class="bi bi-pencil"></i> 수정</a>
            <a sec:authorize="hasRole('ROLE_ADMIN')" th:if="${result.useAt == 'Y'}" class="krds-btn danger"
               th:href="@{/sym/ccm/cde/EgovCcmCmmnDetailCodeRemove.do(codeId=${result.codeId}, code=${result.code})}"
               onclick="return confirm('삭제하시겠습니까?');"><i class="bi bi-trash"></i> 삭제</a>
        </div>
    </div>
</main>
</body>
</html>
