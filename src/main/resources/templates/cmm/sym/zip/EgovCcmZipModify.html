<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title th:text="#{zip.modify.title}">우편번호 수정</title></head>
<body>
<main layout:fragment="content">
    <div class="container">
        <nav aria-label="breadcrumb"><ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}" th:text="#{nav.home}">홈</a></li>
            <li class="breadcrumb-item"><a th:href="@{/sym/ccm/zip/EgovCcmZipList.do}" th:text="#{nav.zip}">우편번호 관리</a></li>
            <li class="breadcrumb-item active" th:text="#{zip.modify.crumb}">수정</li>
        </ol></nav>
        <h1 class="h4 mb-3"><i class="bi bi-geo-alt"></i> <span th:text="#{zip.modify.title}">우편번호 수정</span></h1>

        <div th:if="${zip == null}" class="alert alert-warning"><span th:text="#{zip.modify.empty}">수정할 데이터가 없습니다.</span>
            <a class="alert-link" th:href="@{/sym/ccm/zip/EgovCcmZipList.do}" th:text="#{zip.modify.tolist}">목록으로</a></div>

        <form th:if="${zip != null}" th:action="@{/sym/ccm/zip/EgovCcmZipModify.do}" method="post" th:object="${zip}">
            <input type="hidden" name="cmd" value="Modify"/>
            <input type="hidden" th:field="*{sn}"/>
            <table class="tbl col">
                <caption class="visually-hidden" th:text="#{zip.modify.caption}">우편번호 수정</caption>
                <colgroup><col style="width:160px;"><col></colgroup>
                <tbody>
                <tr>
                    <th scope="row" th:text="#{zip.field.zip}">우편번호</th>
                    <td>
                        <input class="krds-input" type="text" th:field="*{zip}" readonly/>
                    </td>
                </tr>
                <tr>
                    <th scope="row"><span th:text="#{zip.field.ctprvnNm}">시도명</span> <span class="frm-rq">*</span></th>
                    <td><input class="krds-input" type="text" th:field="*{ctprvnNm}" maxlength="20" required/></td>
                </tr>
                <tr>
                    <th scope="row"><span th:text="#{zip.field.signguNm}">시군구명</span> <span class="frm-rq">*</span></th>
                    <td><input class="krds-input" type="text" th:field="*{signguNm}" maxlength="20" required/></td>
                </tr>
                <tr>
                    <th scope="row"><span th:text="#{zip.field.emdNm}">읍면동명</span> <span class="frm-rq">*</span></th>
                    <td><input class="krds-input" type="text" th:field="*{emdNm}" maxlength="30" required/></td>
                </tr>
                <tr>
                    <th scope="row" th:text="#{zip.field.liBuldNm}">리/건물명</th>
                    <td><input class="krds-input" type="text" th:field="*{liBuldNm}" maxlength="60"/></td>
                </tr>
                <tr>
                    <th scope="row" th:text="#{zip.field.lnbrDongHo}">번지/동호</th>
                    <td><input class="krds-input" type="text" th:field="*{lnbrDongHo}" maxlength="20"/></td>
                </tr>
                </tbody>
            </table>
            <div class="d-flex gap-2">
                <button class="krds-btn primary" type="submit"><i class="bi bi-check-lg"></i> <span th:text="#{button.modify}">수정</span></button>
                <a class="krds-btn tertiary" th:href="@{/sym/ccm/zip/EgovCcmZipList.do}" th:text="#{button.cancel}">취소</a>
            </div>
        </form>
    </div>
</main>
</body>
</html>
