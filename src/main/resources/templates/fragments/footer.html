<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="ko">
<body>
<footer th:fragment="footer" class="pub-foot">
    <div class="container">
        <!-- 전자정부표준프레임워크 공식 홈페이지 배너 -->
        <a href="https://www.egovframe.go.kr/home/main.do" target="_blank" rel="noopener"
           class="egov-official-banner" th:title="#{footer.official.title}">
            <span class="ban-txt">
                <strong><i class="bi bi-hexagon-fill"></i> <span th:text="#{footer.official.title}">전자정부표준프레임워크 공식 홈페이지</span></strong>
                <small th:text="#{footer.official.desc}">가이드·다운로드·커뮤니티 — egovframe.go.kr</small>
            </span>
            <span class="ban-go"><span th:text="#{footer.official.go}">바로가기</span> <i class="bi bi-box-arrow-up-right"></i></span>
        </a>

        <div class="pub-foot-top">
            <div>
                <a th:href="@{/}" class="pub-brand">
                    <img class="mark" th:src="@{/images/logo.svg}" alt="eGovFrame"/>
                    <span th:text="#{foot.brand}">전자정부 표준프레임워크 기업업무 공통컴포넌트</span>
                </a>
                <p class="desc" th:text="#{foot.desc}">Spring Boot + Thymeleaf 기반 기업업무 공통컴포넌트 — 게시판·회원/권한·코드·메뉴·프로그램·로그·통계 등 관리자 공통 기능을 KRDS 디자인으로 제공합니다.</p>
            </div>
            <div class="pub-foot-cols">
                <div class="pub-foot-col">
                    <h4 th:text="#{foot.col.shortcut}">바로가기</h4>
                    <a th:href="@{/cop/bbs/selectBoardList.do(bbsId='BBSMSTR_AAAAAAAAAAAA')}" th:text="#{foot.link.notice}">공지사항</a>
                    <a th:href="@{/uss/olh/faq/FaqListInqire.do}" th:text="#{foot.link.faq}">FAQ</a>
                    <a th:href="@{/uss/olh/qna/QnaListInqire.do}" th:text="#{foot.link.qna}">Q&amp;A</a>
                </div>
                <div class="pub-foot-col" sec:authorize="hasRole('ADMIN')">
                    <h4 th:text="#{foot.col.service}">업무</h4>
                    <a th:href="@{/uss/umt/mber/EgovMberManage.do}" th:text="#{foot.link.member}">회원관리</a>
                    <a th:href="@{/sym/ccm/cca/EgovCcmCmmnCodeList.do}" th:text="#{foot.link.code}">공통코드관리</a>
                    <a th:href="@{/sym/log/clg/SelectLoginLogList.do}" th:text="#{nav.loginLog}">접속로그조회</a>
                </div>
                <div class="pub-foot-col">
                    <h4 th:text="#{foot.col.support}">지원</h4>
                    <a sec:authorize="!isAuthenticated()" th:href="@{/uat/uia/egovLoginUsr.do}" th:text="#{foot.link.login}">로그인</a>
                    <a href="/swagger-ui/index.html" target="_blank" th:text="#{foot.link.apidoc}">API 문서</a>
                </div>
            </div>
        </div>

        <div class="pub-foot-bottom">
            <span>© <span th:text="${#temporals.year(#temporals.createNow())}">2026</span> <span th:text="#{foot.copyright.suffix}">전자정부 표준프레임워크 기업업무 공통컴포넌트. All rights reserved.</span></span>
            <span class="soc">
                <a th:href="@{/}" th:title="#{foot.soc.home}" th:attr="aria-label=#{foot.soc.home}" title="홈" aria-label="홈"><i class="bi bi-house"></i></a>
                <a href="https://github.com/gjh999/enterprise-biz-boot" target="_blank" rel="noopener" th:title="#{foot.soc.github}" th:attr="aria-label=#{foot.soc.github}" title="GitHub 저장소" aria-label="GitHub 저장소"><i class="bi bi-github"></i></a>
                <a href="https://www.egovframe.go.kr/home/main.do" target="_blank" rel="noopener" th:title="#{foot.soc.official}" th:attr="aria-label=#{foot.soc.official}" title="전자정부표준프레임워크 공식 홈페이지" aria-label="전자정부표준프레임워크 공식 홈페이지"><i class="bi bi-globe"></i></a>
                <a href="https://www.youtube.com/channel/UC_ZpWtFSV_e_Y5iWjPsGbxQ" target="_blank" rel="noopener" th:title="#{foot.soc.youtube}" th:attr="aria-label=#{foot.soc.youtube}" title="전자정부표준프레임워크 유튜브" aria-label="전자정부표준프레임워크 유튜브"><i class="bi bi-youtube"></i></a>
            </span>
        </div>
    </div>
</footer>
</body>
</html>
