<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="ko">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <meta http-equiv="X-UA-Compatible" content="IE=edge"/>
    <title layout:title-pattern="$CONTENT_TITLE - 전자정부표준프레임워크">전자정부표준프레임워크</title>

    <!--
        KRDS (디지털정부 표준 디자인시스템) — 공식 자산 로컬 적용
        Bootstrap 프레임워크 제거. Bootstrap Icons(bi-*)는 아이콘 폰트로 유지.
        로드순서: bootstrap-icons → krds.min.css(공식) → common → krds-compat → krds (→ theme 전역 오버라이드)
    -->
    <!-- Pretendard GOV 폰트 preload (FOUT 방지) -->
    <link rel="preload" as="font" type="font/woff2" crossorigin
          th:href="@{/krds/resources/fonts/PretendardGOV-Regular.subset.woff2}"/>
    <link rel="preload" as="font" type="font/woff2" crossorigin
          th:href="@{/krds/resources/fonts/PretendardGOV-Bold.subset.woff2}"/>
    <!-- 아이콘 폰트(프레임워크 아님) -->
    <link rel="stylesheet" th:href="@{/css/bootstrap-icons.min.css}">
    <!-- 공식 KRDS 디자인시스템 -->
    <link rel="stylesheet" th:href="@{/krds/resources/cdn/krds.min.css}"/>
    <!-- 공통 CSS -->
    <link rel="stylesheet" th:href="@{/css/common.css}"/>
    <!-- KRDS 호환/구조 레이어(그리드·유틸·GNB) -->
    <link rel="stylesheet" th:href="@{/css/krds-compat.css}"/>
    <!-- KRDS 스킨 미세조정(최종 권위) -->
    <link rel="stylesheet" th:href="@{/css/krds.css}"/>
    <!-- 모던 다크 테마 (전역 오버라이드) -->
    <link rel="stylesheet" th:href="@{/css/theme.css}"/>
    <link rel="icon" type="image/svg+xml" th:href="@{/images/logo.svg}"/>

    <!-- 페이지별 추가 CSS -->
    <th:block layout:fragment="head-css"></th:block>
</head>
<body class="egov-body">

<!-- 접근성: 본문 바로가기 -->
<a href="#content" class="skip-nav" th:text="#{nav.skip}">본문 바로가기</a>

<!-- 헤더 -->
<header class="egov-header" th:replace="~{fragments/header :: header}"></header>

<!-- 네비게이션 -->
<nav class="egov-nav" th:replace="~{fragments/nav :: nav}"></nav>

<!-- 본문 -->
<main id="content" class="egov-content container-fluid py-4">
    <th:block layout:fragment="content">
        <!-- 페이지별 콘텐츠가 여기에 삽입됩니다 -->
    </th:block>
</main>

<!-- 푸터 (포털식 pub-foot) -->
<footer class="pub-foot" th:replace="~{fragments/footer :: footer}"></footer>

<!-- KRDS JS: 공식(탭·아코디언) → compat(data-bs-* 대체) → 스킨 → 공통 -->
<script th:src="@{/krds/resources/cdn/krds.min.js}"></script>
<script th:src="@{/js/krds-compat.js}"></script>
<script th:src="@{/js/krds.js}"></script>
<script th:src="@{/js/common.js}"></script>

<!-- 페이지별 추가 JS -->
<th:block layout:fragment="body-js"></th:block>

<!-- 맨 위로 버튼 (포털 정책 동일: 스크롤 300px↑ 표시, 인쇄 숨김) -->
<button type="button" id="scrollTopBtn" class="scroll-top-btn" th:attr="aria-label=#{layout.scrollTop},title=#{layout.scrollTop}" aria-label="맨 위로" title="맨 위로">
    <i class="bi bi-arrow-up"></i>
</button>
<script th:inline="none">
(function(){
    var btn = document.getElementById('scrollTopBtn');
    if(!btn) return;
    var onScroll = function(){ if(window.scrollY > 300){ btn.classList.add('show'); } else { btn.classList.remove('show'); } };
    window.addEventListener('scroll', onScroll, { passive:true }); onScroll();
    btn.addEventListener('click', function(){ window.scrollTo({ top:0, behavior:'smooth' }); });
})();
</script>
</body>
</html>
