<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title th:text="#{survey.qnn.stats.title}">설문조사 통계</title></head>
<body>
<main layout:fragment="content">
    <div class="container" style="max-width:900px;"
         th:with="info=${Comtnqestnrinfo != null and !#lists.isEmpty(Comtnqestnrinfo)} ? ${Comtnqestnrinfo[0]} : null">
        <nav aria-label="breadcrumb"><ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}" th:text="#{common.home}">홈</a></li>
            <li class="breadcrumb-item"><a th:href="@{/uss/olp/qnn/EgovQustnrRespondInfoManageList.do}" th:text="#{survey.crumb.qnn}">설문조사</a></li>
            <li class="breadcrumb-item active" th:text="#{survey.crumb.statistics}">통계</li>
        </ol></nav>
        <h1 class="h4 mb-3"><i class="bi bi-bar-chart-line"></i> <span th:text="#{survey.qnn.stats.title}">설문조사 통계</span></h1>
        <div class="krds-panel mb-3" th:if="${info != null}"><div class="krds-panel-body">
            <h2 class="h5 mb-1" th:text="${info.qestnrsj}">설문제목</h2>
            <p class="mb-1 text-muted" th:text="${info.qestnrpurps}">설문목적</p>
            <p class="mb-0 small text-muted"><span th:text="${info.qestnrBeginDe}"></span> ~ <span th:text="${info.qestnrEndDe}"></span></p>
        </div></div>

        <h3 class="h6 mt-4" th:text="#{survey.qnn.stats.byQuestion}">문항별 응답 통계</h3>
        <div th:each="q : ${Comtnqustnrqesitm}" class="mb-4">
            <p class="fw-bold mb-2"><span th:text="${q.qestnSn}"></span>. <span th:text="${q.qestnCn}"></span></p>
            <div class="krds-table-wrap"><table class="tbl">
                <thead><tr><th scope="col" th:text="#{survey.stats.col.item}">항목/응답</th><th scope="col" style="width:90px;" th:text="#{survey.col.respondCnt}">응답수</th><th scope="col" style="width:110px;" th:text="#{survey.col.ratioPct}">비율(%)</th></tr></thead>
                <tbody>
                <tr th:each="s : ${qestnrStatistic1}" th:if="${s.qestnrqesitmid == q.qestnrqesitmid}">
                    <td th:text="${s.iemCn}">항목</td>
                    <td class="text-center" th:text="${s.qustnrIemIdCnt}">0</td>
                    <td class="text-center" th:text="${s.qustnrPercent}">0</td>
                </tr>
                <tr th:each="s : ${qestnrStatistic2}" th:if="${s.qestnrqesitmid == q.qestnrqesitmid}">
                    <td colspan="3"><span class="krds-badge bg-gray me-1" th:text="#{survey.qtype.text}">주관식</span><span th:text="${s.respondAnswerCn}"></span></td>
                </tr>
                </tbody>
            </table></div>
        </div>
        <p class="text-muted" th:if="${Comtnqustnrqesitm == null or #lists.isEmpty(Comtnqustnrqesitm)}" th:text="#{survey.qnn.stats.noQuestion}">문항 정보가 없습니다.</p>

        <div class="mt-3"><a class="krds-btn tertiary" th:href="@{/uss/olp/qnn/EgovQustnrRespondInfoManageList.do}" th:text="#{button.list}">목록</a></div>
    </div>
</main>
</body>
</html>
