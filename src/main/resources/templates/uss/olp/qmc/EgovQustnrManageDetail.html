<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title th:text="#{survey.qmc.detail.title}">설문 상세</title></head>
<body>
<main layout:fragment="content">
    <div class="container" style="max-width:820px;" th:with="r=${resultList != null and !#lists.isEmpty(resultList)} ? ${resultList[0]} : null">
        <nav aria-label="breadcrumb"><ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}" th:text="#{common.home}">홈</a></li>
            <li class="breadcrumb-item"><a th:href="@{/uss/olp/qmc/EgovQustnrManageList.do}" th:text="#{survey.qmc.pageTitle}">설문관리</a></li>
            <li class="breadcrumb-item active" th:text="#{survey.crumb.detail}">상세</li>
        </ol></nav>
        <h1 class="h4 mb-3"><i class="bi bi-clipboard-check"></i> <span th:text="#{survey.qmc.detail.heading}">설문지 상세</span></h1>
        <div class="text-muted" th:if="${r == null}" th:text="#{survey.empty.detail}">상세 데이터가 없습니다.</div>
        <div class="krds-table-wrap" th:if="${r != null}">
        <table class="tbl col">
            <tbody>
            <tr><th scope="row" style="width:180px;" th:text="#{survey.col.qestnrSj}">설문제목</th><td th:text="${r['qestnrsj']}"></td></tr>
            <tr><th scope="row" th:text="#{survey.col.qestnrPurps}">설문목적</th><td style="white-space:pre-line;" th:text="${r['qestnrpurps']}"></td></tr>
            <tr><th scope="row" th:text="#{survey.field.qestnrWritngGuidanceCn}">설문작성 안내내용</th><td style="white-space:pre-line;" th:text="${r['qestnrwritngguidancecn']}"></td></tr>
            <tr><th scope="row" th:text="#{survey.col.qestnrTrget}">설문대상</th>
                <td><span th:each="c : ${comCode034}" th:if="${c.code == r['qestnrtrget']}" th:text="${c.codeNm}"></span></td></tr>
            <tr><th scope="row" th:text="#{survey.field.period}">설문기간</th><td><span th:text="${r['qestnrBeginDe']}"></span> ~ <span th:text="${r['qestnrEndDe']}"></span></td></tr>
            <tr><th scope="row" th:text="#{survey.field.tmplatType}">템플릿 유형</th>
                <td>
                    <span th:text="${r['qestnrTmplatTy']}"></span>
                    <img class="ms-2" style="max-height:50px;" th:if="${r['qestnrtmplatid'] != null and r['qestnrtmplatid'] != ''}"
                         th:src="@{/uss/olp/qtm/EgovQustnrTmplatManageImg.do(qestnrTmplatId=${r['qestnrtmplatid']})}" th:alt="#{survey.img.tmplatType.alt}" alt="템플릿유형 이미지"/>
                </td></tr>
            </tbody>
        </table>
        </div>
        <div class="d-flex justify-content-between mt-3" th:if="${r != null}">
            <a class="krds-btn tertiary" th:href="@{/uss/olp/qmc/EgovQustnrManageList.do}" th:text="#{button.list}">목록</a>
            <div sec:authorize="isAuthenticated()">
                <form class="d-inline" th:action="@{/uss/olp/qmc/EgovQustnrManageModify.do}" method="post">
                    <input type="hidden" name="qestnrId" th:value="${r['qestnrId']}"/>
                    <button class="krds-btn primary" type="submit"><i class="bi bi-pencil"></i> <span th:text="#{button.modify}">수정</span></button>
                </form>
                <form class="d-inline" th:action="@{/uss/olp/qmc/EgovQustnrManageDetail.do}" method="post"
                      th:onsubmit="|return confirm('[[#{survey.confirm.deleteSurvey}]]');|">
                    <input type="hidden" name="qestnrId" th:value="${r['qestnrId']}"/>
                    <input type="hidden" name="cmd" value="del"/>
                    <button class="krds-btn danger" type="submit"><i class="bi bi-trash"></i> <span th:text="#{button.delete}">삭제</span></button>
                </form>
            </div>
        </div>
    </div>
</main>
</body>
</html>
