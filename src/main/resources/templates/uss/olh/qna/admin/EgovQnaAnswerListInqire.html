<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title th:text="#{qna.answer.manage.title}">Q&amp;A 답변 관리</title></head>
<body>
<main layout:fragment="content">
    <div class="container">
        <nav aria-label="breadcrumb"><ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}" th:text="#{nav.home}">홈</a></li>
            <li class="breadcrumb-item"><a th:href="@{/uss/olh/qna/admin/QnaListInqire.do}" th:text="#{qna.manage.title}">Q&amp;A 관리</a></li>
            <li class="breadcrumb-item active" th:text="#{qna.manage.answer.title}">답변 관리</li>
        </ol></nav>
        <h1 class="h4 mb-3"><i class="bi bi-chat-square-text"></i> <span th:text="#{qna.answer.manage.title}">Q&amp;A 답변 관리</span></h1>
        <p class="text-muted"><span th:text="#{common.total}">총</span> <strong th:text="${paginationInfo != null ? paginationInfo.totalRecordCount : 0}">0</strong> <span th:text="#{common.unit.case}">건</span></p>

        <!-- 검색조건 -->
        <form class="row g-2 mb-3" th:action="@{/uss/olh/qnm/admin/QnaAnswerListInqire.do}" method="get">
            <div class="col-auto">
                <select class="krds-form-select" name="searchCondition" title="조회조건 선택" th:title="#{qna.search.condition}">
                    <option value="" th:text="#{qna.search.select}">선택</option>
                    <option value="wrterNm" th:selected="${searchVO.searchCondition == 'wrterNm'}" th:text="#{qna.search.wrterNm}">작성자</option>
                    <option value="qnaProcessSttusCodeNm" th:selected="${searchVO.searchCondition == 'qnaProcessSttusCodeNm'}" th:text="#{qna.search.sttus}">처리상태</option>
                </select>
            </div>
            <div class="col-auto">
                <input class="krds-input" type="text" name="searchKeyword"
                       th:value="${searchVO.searchKeyword}" maxlength="35" title="검색어 입력" th:title="#{common.search.ph}"/>
            </div>
            <div class="col-auto">
                <button class="krds-btn tertiary small" type="submit"><i class="bi bi-search"></i> <span th:text="#{button.inquiry}">조회</span></button>
            </div>
        </form>

        <div class="krds-table-wrap">
        <table class="tbl">
            <thead>
            <tr>
                <th scope="col" style="width:90px;" th:text="#{qna.col.sttus}">상태</th>
                <th scope="col" th:text="#{qna.col.title}">제목</th>
                <th scope="col" style="width:120px;" th:text="#{qna.col.wrterNm}">작성자</th>
                <th scope="col" style="width:130px;" th:text="#{qna.col.writngDe}">작성일</th>
                <th scope="col" style="width:80px;" th:text="#{qna.col.inqireCo}">조회</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="item : ${resultList}">
                <td class="text-center">
                    <span class="krds-badge"
                          th:classappend="${item['qnaProcessSttusCode'] == '3'} ? 'bg-success' : 'bg-gray'"
                          th:text="${item['qnaProcessSttusCodeNm']} ?: #{qna.sttus.receipt}">상태</span>
                </td>
                <td>
                    <a class="text-decoration-none"
                       th:href="@{/uss/olh/qnm/admin/QnaAnswerDetailInqire.do(qaId=${item['qaId']})}"
                       th:text="${item['qestnSj']}">제목</a>
                </td>
                <td class="text-center" th:text="${item['wrterNm']}">작성자</td>
                <td class="text-center" th:text="${item['frstRegistPnttm']}">작성일</td>
                <td class="text-center" th:text="${item['rdcnt'] ?: 0}">0</td>
            </tr>
            <tr th:if="${resultList == null or #lists.isEmpty(resultList)}">
                <td colspan="5" class="text-center text-muted py-4" th:text="#{qna.empty}">등록된 질문이 없습니다.</td>
            </tr>
            </tbody>
        </table>
        </div>

        <!-- 페이징 -->
        <div class="mt-3"
             th:replace="~{fragments/pagination :: paginationSearch(paginationInfo=${paginationInfo}, baseUrl='/uss/olh/qnm/admin/QnaAnswerListInqire.do', searchCondition=${searchVO.searchCondition}, searchKeyword=${searchVO.searchKeyword})}"></div>
    </div>
</main>
</body>
</html>
