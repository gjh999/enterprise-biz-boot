<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title>프로그램목록관리</title></head>
<body>
<main layout:fragment="content">
    <div class="container">
        <nav aria-label="breadcrumb"><ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}">홈</a></li>
            <li class="breadcrumb-item">내부시스템관리</li>
            <li class="breadcrumb-item active">프로그램목록관리</li>
        </ol></nav>
        <h1 class="h4 mb-3"><i class="bi bi-card-list"></i> 프로그램목록관리</h1>

        <form th:action="@{/sym/prm/EgovProgramListManageSelect.do}" method="get" class="mb-3">
            <div class="input-group" style="max-width:480px;">
                <span class="input-group-text">프로그램 한글명</span>
                <input type="text" class="form-control" name="searchKeyword" maxlength="60"
                       th:value="${searchVO != null ? searchVO.searchKeyword : ''}"/>
                <button class="btn btn-outline-secondary" type="submit"><i class="bi bi-search"></i> 조회</button>
            </div>
        </form>

        <table class="table table-hover align-middle">
            <thead class="table-light"><tr>
                <th>프로그램파일명</th>
                <th>프로그램 한글명</th>
                <th>URL</th>
                <th>프로그램설명</th>
            </tr></thead>
            <tbody>
            <tr th:each="item : ${list_progrmmanage}">
                <td>
                    <a class="lnk" th:href="@{/sym/prm/EgovProgramListDetailSelect.do(tmp_progrmNm=${item.progrmFileNm})}"
                       th:text="${item.progrmFileNm}">파일명</a>
                </td>
                <td th:text="${item.progrmKoreanNm}">한글명</td>
                <td th:text="${item.URL}">URL</td>
                <td th:text="${item.progrmDc}">설명</td>
            </tr>
            <tr th:if="${#lists.isEmpty(list_progrmmanage)}">
                <td colspan="4" class="text-center text-muted py-4">등록된 프로그램이 없습니다.</td>
            </tr>
            </tbody>
        </table>

        <div class="text-end">
            <a class="btn btn-primary btn-sm" th:href="@{/sym/prm/EgovProgramListRegist.do}"><i class="bi bi-plus-lg"></i> 등록</a>
        </div>
    </div>
</main>
</body>
</html>
