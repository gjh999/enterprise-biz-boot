<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title>프로그램목록 상세</title></head>
<body>
<main layout:fragment="content">
    <div class="container">
        <nav aria-label="breadcrumb"><ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}">홈</a></li>
            <li class="breadcrumb-item"><a th:href="@{/sym/prm/EgovProgramListManageSelect.do}">프로그램목록관리</a></li>
            <li class="breadcrumb-item active">프로그램목록 상세</li>
        </ol></nav>
        <h1 class="h4 mb-3"><i class="bi bi-card-list"></i> 프로그램목록 상세/수정</h1>

        <form th:action="@{/sym/prm/EgovProgramListDetailSelectUpdt.do}" method="post" th:object="${progrmManageVO}">
            <input type="hidden" name="cmd" value="update"/>
            <input type="hidden" th:field="*{progrmFileNm}"/>
            <div class="krds-panel">
                <div class="krds-panel-body">
                    <div class="mb-3">
                        <div class="form-tit"><label for="progrmFileNmView">프로그램파일명 <span class="frm-rq">*</span></label></div>
                        <input type="text" class="krds-input" id="progrmFileNmView" readonly th:value="*{progrmFileNm}"/>
                    </div>
                    <div class="mb-3">
                        <div class="form-tit"><label for="progrmStrePath">저장경로 <span class="frm-rq">*</span></label></div>
                        <input type="text" class="krds-input" id="progrmStrePath" th:field="*{progrmStrePath}" maxlength="60" required/>
                        <div class="text-danger small" th:if="${#fields.hasErrors('progrmStrePath')}" th:errors="*{progrmStrePath}"></div>
                    </div>
                    <div class="mb-3">
                        <div class="form-tit"><label for="progrmKoreanNm">프로그램 한글명 <span class="frm-rq">*</span></label></div>
                        <input type="text" class="krds-input" id="progrmKoreanNm" th:field="*{progrmKoreanNm}" maxlength="50" required/>
                        <div class="text-danger small" th:if="${#fields.hasErrors('progrmKoreanNm')}" th:errors="*{progrmKoreanNm}"></div>
                    </div>
                    <div class="mb-3">
                        <div class="form-tit"><label for="URL">URL <span class="frm-rq">*</span></label></div>
                        <input type="text" class="krds-input" id="URL" th:field="*{URL}" maxlength="60" required/>
                        <div class="text-danger small" th:if="${#fields.hasErrors('URL')}" th:errors="*{URL}"></div>
                    </div>
                    <div class="mb-3">
                        <div class="form-tit"><label for="progrmDc">프로그램설명</label></div>
                        <textarea class="krds-input" id="progrmDc" th:field="*{progrmDc}" rows="6"></textarea>
                    </div>
                </div>
            </div>
            <div class="d-flex justify-content-between mt-3">
                <button type="submit" class="krds-btn danger small"
                        th:formaction="@{/sym/prm/EgovProgramListManageDelete.do}"
                        onclick="return confirm('삭제하시겠습니까?');"><i class="bi bi-trash"></i> 삭제</button>
                <div>
                    <a class="krds-btn tertiary small" th:href="@{/sym/prm/EgovProgramListManageSelect.do}">목록</a>
                    <button type="submit" class="krds-btn primary small"><i class="bi bi-check-lg"></i> 저장</button>
                </div>
            </div>
        </form>
    </div>
</main>
</body>
</html>
