<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title>프로그램 변경요청</title></head>
<body>
<main layout:fragment="content">
    <div class="container">
        <nav aria-label="breadcrumb"><ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}">홈</a></li>
            <li class="breadcrumb-item">내부시스템관리</li>
            <li class="breadcrumb-item active">프로그램 변경요청</li>
        </ol></nav>
        <h1 class="h4 mb-3"><i class="bi bi-pencil-square"></i> 프로그램 변경요청</h1>

        <p class="text-danger small" th:if="${resultMsg != null and resultMsg != ''}" th:text="${resultMsg}"></p>

        <form th:action="@{/sym/prm/EgovProgramChangeRequstSelect.do}" method="get" class="mb-3">
            <div class="input-group" style="max-width:480px;">
                <span class="input-group-text">프로그램 한글명</span>
                <input type="text" class="form-control" name="searchKeyword" maxlength="60"
                       th:value="${searchVO != null ? searchVO.searchKeyword : ''}"/>
                <button class="btn btn-outline-secondary" type="submit"><i class="bi bi-search"></i> 조회</button>
            </div>
        </form>

        <table class="table table-hover align-middle">
            <thead class="table-light"><tr>
                <th>요청제목</th>
                <th>프로그램파일명</th>
                <th>요청자</th>
                <th style="width:110px;">요청일자</th>
                <th style="width:90px;">처리상태</th>
            </tr></thead>
            <tbody>
            <tr th:each="item : ${list_changerequst}">
                <td>
                    <a class="lnk" th:href="@{/sym/prm/EgovProgramChangRequstDetailSelect.do(tmp_progrmNm=${item.progrmFileNm},tmp_rqesterNo=${item.requstNo})}"
                       th:text="${item.requstSj}">요청제목</a>
                </td>
                <td th:text="${item.progrmFileNm}">파일명</td>
                <td th:text="${item.rqesterId}">요청자</td>
                <td th:text="${item.requstDe}">요청일자</td>
                <td th:switch="${item.processSttusCode}" class="text-center">
                    <span th:case="'A'" class="badge bg-secondary">요청</span>
                    <span th:case="'P'" class="badge bg-warning text-dark">처리중</span>
                    <span th:case="'C'" class="badge bg-success">완료</span>
                    <span th:case="'R'" class="badge bg-danger">반려</span>
                    <span th:case="*" th:text="${item.processSttusCode}">-</span>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(list_changerequst)}">
                <td colspan="5" class="text-center text-muted py-4">조회된 데이터가 없습니다.</td>
            </tr>
            </tbody>
        </table>

        <div th:replace="~{fragments/pagination :: paginationSearch(paginationInfo=${paginationInfo}, baseUrl='/sym/prm/EgovProgramChangeRequstSelect.do', searchCondition=${searchVO != null ? searchVO.searchCondition : ''}, searchKeyword=${searchVO != null ? searchVO.searchKeyword : ''})}"></div>

        <div class="text-end">
            <a class="btn btn-primary btn-sm" th:href="@{/sym/prm/EgovProgramChangRequstStre.do}"><i class="bi bi-plus-lg"></i> 변경요청 등록</a>
        </div>
    </div>
</main>
</body>
</html>
