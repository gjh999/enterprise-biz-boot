<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title>프로그램 변경요청 상세</title></head>
<body>
<main layout:fragment="content">
    <div class="container">
        <nav aria-label="breadcrumb"><ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}">홈</a></li>
            <li class="breadcrumb-item"><a th:href="@{/sym/prm/EgovProgramChangeRequstSelect.do}">프로그램 변경요청</a></li>
            <li class="breadcrumb-item active">변경요청 상세/수정</li>
        </ol></nav>
        <h1 class="h4 mb-3"><i class="bi bi-pencil-square"></i> 변경요청 상세/수정</h1>

        <p class="text-danger small" th:if="${resultMsg != null and resultMsg != ''}" th:text="${resultMsg}"></p>

        <form th:action="@{/sym/prm/EgovProgramChangRequstDetailSelectUpdt.do}" method="post" th:object="${progrmManageDtlVO}">
            <input type="hidden" th:field="*{progrmFileNm}"/>
            <input type="hidden" th:field="*{rqesterNo}"/>
            <input type="hidden" th:field="*{rqesterPersonId}"/>
            <div class="card">
                <div class="card-body">
                    <div class="mb-3">
                        <label class="form-label">프로그램파일명</label>
                        <input type="text" class="form-control" readonly th:value="*{progrmFileNm}"/>
                    </div>
                    <div class="mb-3">
                        <label class="form-label" for="rqesterPersonIdView">요청자ID</label>
                        <input type="text" class="form-control" id="rqesterPersonIdView" readonly th:value="*{rqesterPersonId}"/>
                    </div>
                    <div class="mb-3">
                        <label class="form-label" for="rqesterSj">요청제목</label>
                        <input type="text" class="form-control" id="rqesterSj" th:field="*{rqesterSj}" maxlength="100"/>
                        <div class="text-danger small" th:if="${#fields.hasErrors('rqesterSj')}" th:errors="*{rqesterSj}"></div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label" for="rqesterDe">요청일자</label>
                        <input type="text" class="form-control" id="rqesterDe" th:field="*{rqesterDe}" maxlength="20" placeholder="예) 20250101"/>
                    </div>
                    <div class="mb-3">
                        <label class="form-label" for="changerqesterCn">변경요청내용</label>
                        <textarea class="form-control" id="changerqesterCn" th:field="*{changerqesterCn}" rows="6"></textarea>
                    </div>
                </div>
            </div>
            <div class="d-flex justify-content-between mt-3">
                <button type="submit" class="btn btn-outline-danger btn-sm"
                        th:formaction="@{/sym/prm/EgovProgramChangRequstDelete.do}"
                        onclick="return confirm('삭제하시겠습니까?');"><i class="bi bi-trash"></i> 삭제</button>
                <div>
                    <a class="btn btn-outline-secondary btn-sm" th:href="@{/sym/prm/EgovProgramChangeRequstSelect.do}">목록</a>
                    <button type="submit" class="btn btn-primary btn-sm"><i class="bi bi-check-lg"></i> 저장</button>
                </div>
            </div>
        </form>
    </div>
</main>
</body>
</html>
