<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title th:text="#{prgm.chgRequst.detail.head}">프로그램 변경요청 상세</title></head>
<body>
<main layout:fragment="content">
    <div class="container">
        <nav aria-label="breadcrumb"><ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}" th:text="#{nav.home}">홈</a></li>
            <li class="breadcrumb-item"><a th:href="@{/sym/prm/EgovProgramChangeRequstSelect.do}" th:text="#{prgm.chgRequst.title}">프로그램 변경요청</a></li>
            <li class="breadcrumb-item active" th:text="#{prgm.chgRequst.detail.head}">변경요청 상세/수정</li>
        </ol></nav>
        <h1 class="h4 mb-3"><i class="bi bi-pencil-square"></i> <span th:text="#{prgm.chgRequst.detail.head}">변경요청 상세/수정</span></h1>

        <p class="text-danger small" th:if="${resultMsg != null and resultMsg != ''}" th:text="${resultMsg}"></p>

        <form th:action="@{/sym/prm/EgovProgramChangRequstDetailSelectUpdt.do}" method="post" th:object="${progrmManageDtlVO}">
            <input type="hidden" th:field="*{progrmFileNm}"/>
            <input type="hidden" th:field="*{rqesterNo}"/>
            <input type="hidden" th:field="*{rqesterPersonId}"/>
            <div class="krds-panel">
                <div class="krds-panel-body">
                    <div class="mb-3">
                        <div class="form-tit"><label th:text="#{prgm.fileNm}">프로그램파일명</label></div>
                        <input type="text" class="krds-input" readonly th:value="*{progrmFileNm}"/>
                    </div>
                    <div class="mb-3">
                        <div class="form-tit"><label for="rqesterPersonIdView" th:text="#{prgm.requstrId}">요청자ID</label></div>
                        <input type="text" class="krds-input" id="rqesterPersonIdView" readonly th:value="*{rqesterPersonId}"/>
                    </div>
                    <div class="mb-3">
                        <div class="form-tit"><label for="rqesterSj" th:text="#{prgm.requstSj}">요청제목</label></div>
                        <input type="text" class="krds-input" id="rqesterSj" th:field="*{rqesterSj}" maxlength="100"/>
                        <div class="text-danger small" th:if="${#fields.hasErrors('rqesterSj')}" th:errors="*{rqesterSj}"></div>
                    </div>
                    <div class="mb-3">
                        <div class="form-tit"><label for="rqesterDe" th:text="#{prgm.requstDe}">요청일자</label></div>
                        <input type="text" class="krds-input" id="rqesterDe" th:field="*{rqesterDe}" maxlength="20" placeholder="예) 20250101"/>
                    </div>
                    <div class="mb-3">
                        <div class="form-tit"><label for="changerqesterCn" th:text="#{prgm.changeRequstCn}">변경요청내용</label></div>
                        <textarea class="krds-input" id="changerqesterCn" th:field="*{changerqesterCn}" rows="6"></textarea>
                    </div>
                </div>
            </div>
            <div class="d-flex justify-content-between mt-3">
                <button type="submit" class="krds-btn danger small"
                        th:formaction="@{/sym/prm/EgovProgramChangRequstDelete.do}"
                        onclick="return confirm('삭제하시겠습니까?');"><i class="bi bi-trash"></i> <span th:text="#{button.delete}">삭제</span></button>
                <div>
                    <a class="krds-btn tertiary small" th:href="@{/sym/prm/EgovProgramChangeRequstSelect.do}" th:text="#{button.list}">목록</a>
                    <button type="submit" class="krds-btn primary small"><i class="bi bi-check-lg"></i> <span th:text="#{button.save}">저장</span></button>
                </div>
            </div>
        </form>
    </div>
</main>
</body>
</html>
