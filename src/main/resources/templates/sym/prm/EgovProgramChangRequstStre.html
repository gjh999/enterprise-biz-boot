<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title>프로그램 변경요청 등록</title></head>
<body>
<main layout:fragment="content">
    <div class="container">
        <nav aria-label="breadcrumb"><ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}">홈</a></li>
            <li class="breadcrumb-item"><a th:href="@{/sym/prm/EgovProgramChangeRequstSelect.do}">프로그램 변경요청</a></li>
            <li class="breadcrumb-item active">변경요청 등록</li>
        </ol></nav>
        <h1 class="h4 mb-3"><i class="bi bi-plus-square"></i> 변경요청 등록</h1>

        <form th:action="@{/sym/prm/EgovProgramChangRequstStre.do}" method="post" th:object="${progrmManageDtlVO}">
            <input type="hidden" name="cmd" value="insert"/>
            <input type="hidden" th:field="*{rqesterNo}"/>
            <input type="hidden" th:field="*{rqesterPersonId}"/>
            <div class="card">
                <div class="card-body">
                    <div class="mb-3">
                        <label class="form-label" for="progrmFileNm">프로그램파일명 <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="progrmFileNm" th:field="*{progrmFileNm}" maxlength="50" required/>
                        <div class="text-danger small" th:if="${#fields.hasErrors('progrmFileNm')}" th:errors="*{progrmFileNm}"></div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label" for="rqesterSj">요청제목</label>
                        <input type="text" class="form-control" id="rqesterSj" th:field="*{rqesterSj}" maxlength="100"/>
                    </div>
                    <div class="mb-3">
                        <label class="form-label" for="rqesterDe">요청일자</label>
                        <input type="text" class="form-control" id="rqesterDe" th:field="*{rqesterDe}" maxlength="20" placeholder="예) 20250101"/>
                    </div>
                    <div class="mb-3">
                        <label class="form-label" for="changerqesterCn">변경요청내용</label>
                        <textarea class="form-control" id="changerqesterCn" th:field="*{changerqesterCn}" rows="6"></textarea>
                    </div>
                </div>
            </div>
            <div class="d-flex justify-content-end mt-3 gap-2">
                <a class="btn btn-outline-secondary btn-sm" th:href="@{/sym/prm/EgovProgramChangeRequstSelect.do}">목록</a>
                <button type="submit" class="btn btn-primary btn-sm"><i class="bi bi-check-lg"></i> 등록</button>
            </div>
        </form>
    </div>
</main>
</body>
</html>
