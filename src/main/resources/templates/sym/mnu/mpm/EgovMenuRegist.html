<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title>메뉴정보 등록</title></head>
<body>
<main layout:fragment="content">
    <div class="container">
        <nav aria-label="breadcrumb"><ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}">홈</a></li>
            <li class="breadcrumb-item"><a th:href="@{/sym/mnu/mpm/EgovMenuManageSelect.do}">메뉴목록관리</a></li>
            <li class="breadcrumb-item active">메뉴 등록</li>
        </ol></nav>
        <h1 class="h4 mb-3"><i class="bi bi-plus-square"></i> 메뉴정보 등록</h1>

        <form method="post" th:action="@{/sym/mnu/mpm/EgovMenuRegistInsert.do}" th:object="${menuManageVO}">
            <table class="table">
                <tbody>
                <tr><th class="table-light" style="width:180px;">메뉴번호</th><td><input class="form-control" type="number" th:field="*{menuNo}" required/></td></tr>
                <tr><th class="table-light">메뉴명</th><td><input class="form-control" type="text" th:field="*{menuNm}" maxlength="50" required/></td></tr>
                <tr><th class="table-light">메뉴순서</th><td><input class="form-control" type="number" th:field="*{menuOrdr}" required/></td></tr>
                <tr><th class="table-light">상위메뉴번호</th><td><input class="form-control" type="number" th:field="*{upperMenuId}" required/></td></tr>
                <tr><th class="table-light">프로그램파일명</th><td><input class="form-control" type="text" th:field="*{progrmFileNm}" maxlength="50" required/></td></tr>
                <tr><th class="table-light">메뉴설명</th><td><input class="form-control" type="text" th:field="*{menuDc}" maxlength="100"/></td></tr>
                <tr><th class="table-light">관련이미지경로</th><td><input class="form-control" type="text" th:field="*{relateImagePath}" maxlength="100"/></td></tr>
                <tr><th class="table-light">관련이미지명</th><td><input class="form-control" type="text" th:field="*{relateImageNm}" maxlength="50"/></td></tr>
                </tbody>
            </table>
            <div class="text-end">
                <a class="btn btn-outline-secondary btn-sm" th:href="@{/sym/mnu/mpm/EgovMenuManageSelect.do}">목록</a>
                <button type="submit" class="btn btn-primary btn-sm"><i class="bi bi-check-lg"></i> 저장</button>
            </div>
        </form>
    </div>
</main>
</body>
</html>
