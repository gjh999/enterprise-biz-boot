<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title th:text="#{sec.group.update.title}">그룹 수정</title></head>
<body>
<main layout:fragment="content">
    <div class="container">
        <nav aria-label="breadcrumb"><ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}" th:text="#{common.home}">홈</a></li>
            <li class="breadcrumb-item"><a th:href="@{/sec/gmt/EgovGroupListView.do}" th:text="#{sec.group.title}">그룹관리</a></li>
            <li class="breadcrumb-item active" th:text="#{sec.group.update.title}">그룹 수정</li>
        </ol></nav>
        <h1 class="h4 mb-3"><i class="bi bi-diagram-3"></i> <span th:text="#{sec.group.update.title}">그룹 수정</span></h1>

        <form th:action="@{/sec/gmt/EgovGroupUpdate.do}" method="post">
            <input type="hidden" name="groupId" th:value="${groupManage?.groupId}"/>
            <div class="krds-panel">
                <div class="krds-panel-body">
                    <div class="mb-3">
                        <div class="form-tit"><label for="groupId" th:text="#{sec.group.label.id}">그룹 ID</label></div>
                        <input type="text" class="krds-input" id="groupId" readonly th:value="${groupManage?.groupId}"/>
                    </div>
                    <div class="mb-3">
                        <div class="form-tit"><label for="groupNm"><span th:text="#{sec.group.label.name}">그룹 명</span> <span class="frm-rq">*</span></label></div>
                        <input type="text" class="krds-input" id="groupNm" name="groupNm" maxlength="50" required th:value="${groupManage?.groupNm}"/>
                    </div>
                    <div class="mb-3">
                        <div class="form-tit"><label for="groupDc" th:text="#{sec.group.desc}">설명</label></div>
                        <input type="text" class="krds-input" id="groupDc" name="groupDc" maxlength="50" th:value="${groupManage?.groupDc}"/>
                    </div>
                    <div class="mb-3">
                        <div class="form-tit"><label for="groupCreatDe" th:text="#{sec.group.label.creatDe}">등록일자</label></div>
                        <input type="text" class="krds-input" id="groupCreatDe" readonly th:value="${groupManage?.groupCreatDe}"/>
                    </div>
                </div>
            </div>
            <div class="d-flex justify-content-between mt-3">
                <button type="submit" class="krds-btn danger small"
                        th:formaction="@{/sec/gmt/EgovGroupDelete.do}"
                        th:onclick="'return confirm(\'' + #{sec.confirm.delete} + '\');'"><i class="bi bi-trash"></i> <span th:text="#{button.delete}">삭제</span></button>
                <div>
                    <a class="krds-btn tertiary small" th:href="@{/sec/gmt/EgovGroupListView.do}" th:text="#{button.list}">목록</a>
                    <button type="submit" class="krds-btn primary small"><i class="bi bi-check-lg"></i> <span th:text="#{button.save}">저장</span></button>
                </div>
            </div>
        </form>
    </div>
</main>
</body>
</html>
