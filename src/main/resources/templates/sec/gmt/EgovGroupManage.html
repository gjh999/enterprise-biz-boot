<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/default}" lang="ko">
<head><title th:text="#{sec.group.title}">그룹관리</title></head>
<body>
<main layout:fragment="content">
    <div class="container">
        <nav aria-label="breadcrumb"><ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}" th:text="#{common.home}">홈</a></li>
            <li class="breadcrumb-item active" th:text="#{sec.group.title}">그룹관리</li>
        </ol></nav>
        <h1 class="h4 mb-3"><i class="bi bi-diagram-3"></i> <span th:text="#{sec.group.title}">그룹관리</span></h1>
        <div class="krds-table-wrap">
        <table class="tbl">
            <caption class="visually-hidden" th:text="#{sec.group.caption}">그룹 목록</caption>
            <thead><tr><th scope="col" th:text="#{sec.group.id}">그룹ID</th><th scope="col" th:text="#{sec.group.name}">그룹명</th><th scope="col" th:text="#{sec.group.desc}">설명</th><th scope="col" style="width:140px;" th:text="#{sec.group.creatDe}">생성일</th><th scope="col" style="width:120px;"></th></tr></thead>
            <tbody>
            <tr th:each="item : ${groupList}">
                <td th:text="${item.groupId}">ID</td>
                <td th:text="${item.groupNm}">그룹명</td>
                <td th:text="${item.groupDc}">설명</td>
                <td class="text-center" th:text="${item.groupCreatDe}">생성일</td>
                <td class="text-end">
                    <a class="krds-btn tertiary small" th:href="@{/sec/gmt/EgovGroup.do(groupId=${item.groupId})}"><i class="bi bi-pencil"></i> <span th:text="#{button.modify}">수정</span></a>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(groupList)}"><td colspan="5" class="text-center text-muted py-4" th:text="#{sec.group.empty}">등록된 그룹이 없습니다.</td></tr>
            </tbody>
        </table>
        </div>
        <div class="text-end"><a class="krds-btn primary small" th:href="@{/sec/gmt/EgovGroupInsertView.do}"><i class="bi bi-plus-lg"></i> <span th:text="#{sec.group.register}">그룹 등록</span></a></div>
    </div>
</main>
</body>
</html>
